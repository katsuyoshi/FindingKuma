name: FindingKuma Monitor

on:
  workflow_dispatch:  # Triggered by external cron service (cron-job.org)

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: |
            yolov8n.pt
            bear_detector.pt
          key: models-yolov8n-bear-v1

      - name: Download custom model from release
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: gh release download model-v1 -p 'bear_detector.pt' -O bear_detector.pt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 scripts/monitor.py \
            --source all \
            --hours 1 \
            --classes japan \
            --confidence 0.4 \
            --notify-classes bear,wildlife \
            --dual-model bear_detector.pt \
            --results-dir results

      - name: Upload detected images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detections-${{ github.run_number }}
          path: results/detected_*.jpg
          retention-days: 30
          if-no-files-found: ignore
